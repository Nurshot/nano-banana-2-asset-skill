name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 -m unittest discover -s tests -v
      - run: python3 scripts/build_release.py --check
      - name: Verify release archives
        run: |
          test -f dist/nano-banana-2-assets-openai-0.1.0.zip
          test -f dist/nano-banana-2-assets-claude-0.1.0.zip
